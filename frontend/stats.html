<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="logo.png">
<meta charset="UTF-8">
<title>My Performance Dashboard</title>
        <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8P3QWMYSXY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-8P3QWMYSXY');
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
body {
    font-family: 'Segoe UI';
    background: #f5f7fb;
    padding: 20px;
}

.header { text-align:center; }

.card {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 20px;
    margin-top: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}
.card:hover { transform: translateY(-4px); }

.stats-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.stat-box {
    background:#1746a2;
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.exam {
    border-bottom:1px solid #eee;
    padding:10px;
}

.good {color:green;}
.avg {color:orange;}
.bad {color:red;}

.insight {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-size: 14px;
}
.goodInsight { background:#ecfdf5; color:#16a34a; }
.warnInsight { background:#fff7ed; color:#d97706; }
.badInsight { background:#fef2f2; color:#dc2626; }




    
</style>
</head>

<body>

<h1 class="header">📊 My Performance Dashboard</h1>

<div class="stats-grid">
  <div class="stat-box">
    <h2 id="totalExams">0</h2>
    <p>Total Exams</p>
  </div>

  <div class="stat-box">
    <h2 id="avgScore">0%</h2>
    <p>Average</p>
  </div>

  <div class="stat-box">
    <h2 id="bestScore">0%</h2>
    <p>Best</p>
  </div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<div class="card">
  <h3>📊 Chapter Performance</h3>
  <canvas id="chapterChart"></canvas>
</div>

<div class="card">
  <h3>🧠 Smart Insights</h3>
  <div id="insightsBox">Analyzing...</div>
</div>

<div class="card">
  <h3>📚 Exam History</h3>
  <div id="examList"></div>
</div>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyA9sSSCsEW_XWsOpz1sGJtFIuEEDLSxaj8",
    authDomain: "cma-vidyarthi-3c892.firebaseapp.com",
    projectId: "cma-vidyarthi-3c892",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const userId = localStorage.getItem("userId");

if (!userId) {
    alert("Login first");
    window.location.href = "login.html";
}

// 🚀 FIRESTORE FETCH
db.collection("exams")
.where("student_id", "==", userId)
.onSnapshot(snapshot => {

    let data = [];

    snapshot.forEach(doc => {
        data.push(doc.data());
    });

    if (data.length === 0) {
        document.getElementById("examList").innerHTML = "No exams yet";
        return;
    }

    data.sort((a,b) => new Date(b.date) - new Date(a.date));

    let labels = [], scores = [];
    let total = data.length, sum = 0, best = 0;

    let list = document.getElementById("examList");
    list.innerHTML = "";

    let chapterStats = {};

    data.forEach(e => {

        let percent = Number(e.percentage) || 0;
        let name = `${e.paper} - ${e.subject}`;
        let chapter = e.chapter || "No Chapter";

        labels.push(name);
        scores.push(percent);

        sum += percent;
        if (percent > best) best = percent;

        if (!chapterStats[chapter]) {
            chapterStats[chapter] = { total: 0, sum: 0 };
        }
        chapterStats[chapter].total++;
        chapterStats[chapter].sum += percent;

        let cls = percent >= 70 ? "good" :
                  percent >= 40 ? "avg" : "bad";

        list.innerHTML += `
        <div class="exam">
            <b>${name}</b><br>
            📘 ${chapter}<br>
            <span class="${cls}">${percent.toFixed(2)}%</span><br>
            📅 ${new Date(e.date).toLocaleString()}
        </div>`;
    });

    document.getElementById("totalExams").textContent = total;
    document.getElementById("avgScore").textContent = (sum/total).toFixed(1) + "%";
    document.getElementById("bestScore").textContent = best.toFixed(1) + "%";

    // 📈 LINE CHART
    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Performance %",
                data: scores,
                borderColor: "#2563eb",
                fill: true,
                tension: 0.4
            }]
        }
    });

    // 📊 CHAPTER CHART
    let chLabels = [], chData = [];

    for (let ch in chapterStats) {
        chLabels.push(ch);
        chData.push((chapterStats[ch].sum / chapterStats[ch].total).toFixed(1));
    }

    new Chart(document.getElementById("chapterChart"), {
        type: "bar",
        data: {
            labels: chLabels,
            datasets: [{
                label: "Avg %",
                data: chData
            }]
        }
    });

    generateInsights(data, sum, total, chapterStats);
});

function generateInsights(data, sum, total, chapterStats) {

    let avg = sum / total;
    let weakest = "";
    let min = 101;

    for (let ch in chapterStats) {
        let v = chapterStats[ch].sum / chapterStats[ch].total;
        if (v < min) {
            min = v;
            weakest = ch;
        }
    }

    let insights = [];

    insights.push(`<div class="insight ${avg>=60?'goodInsight':'warnInsight'}">
    📊 Average Score: <b>${avg.toFixed(1)}%</b>
    </div>`);

    insights.push(`<div class="insight badInsight">
    🎯 Weakest Chapter: <b>${weakest}</b>
    </div>`);

    insights.push(`<div class="insight goodInsight">
    🚀 Next Target: <b>${Math.min(avg+10,100).toFixed(1)}%</b>
    </div>`);

    document.getElementById("insightsBox").innerHTML = insights.join("");
}

</script>

</body>
</html>

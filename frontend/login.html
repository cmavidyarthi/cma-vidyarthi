<!DOCTYPE html>
<html>
<head>

    <title>CMA Vidyarthi Login</title>
     <meta name="description"
    content="Login to CMA Vidyarthi to access your dashboard, mock tests, and progress tracking.">

    <link rel="canonical"
    href="https://cma-vidyarthi.vercel.app/login">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0a1f44,#1746a2);
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            overflow-y:auto;
            padding:20px;
        }

        /* TOP SECTION */

        .top-section{
            text-align:center;
            color:white;
            margin-bottom:30px;
            animation:fadeDown 0.8s ease;
        }

        .top-section img{
            width:120px;
            height:120px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid white;
            margin-bottom:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        .top-section h1{
            font-size:40px;
            margin-bottom:10px;
        }

        .top-section p{
            font-size:16px;
            max-width:500px;
            line-height:1.6;
            opacity:0.95;
        }

        /* LOGIN BOX */

        .login-box{
            width:380px;
            background:white;
            padding:35px;
            border-radius:22px;
            box-shadow:0 20px 50px rgba(0,0,0,0.2);
            animation:fadeUp 0.8s ease;
        }

        .login-box h2{
            text-align:center;
            margin-bottom:25px;
            color:#0a1f44;
            font-size:28px;
        }

        input,
        select{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #dbeafe;
            border-radius:12px;
            font-size:15px;
            transition:0.3s;
        }

        input:focus,
        select:focus{
            outline:none;
            border-color:#2563eb;
            box-shadow:0 0 0 4px rgba(37,99,235,0.12);
        }

        /* PASSWORD BOX */

        .password-box{
            position:relative;
        }

        .password-box input{
            width:100%;
            padding-right:50px;
        }

        .password-box span{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            font-size:18px;
            user-select:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn{
            background:#1746a2;
            color:white;
            margin-top:10px;
        }

        .login-btn:hover{
            background:#0a1f44;
            transform:translateY(-2px);
        }

        .google-btn{
            background:#db4437;
            color:white;
            margin-top:12px;
        }

        .google-btn:hover{
            transform:translateY(-2px);
        }

        .signup-link{
            text-align:center;
            margin-top:18px;
            font-size:14px;
            color:#64748b;
        }

        .signup-link a{
            color:#1746a2;
            text-decoration:none;
            font-weight:bold;
        }

        /* ANIMATIONS */

        @keyframes fadeUp{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @keyframes fadeDown{
            from{
                opacity:0;
                transform:translateY(-40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* MOBILE */

        @media(max-width:600px){

            body{
                padding:20px;
            }

            .top-section img{
                width:95px;
                height:95px;
            }

            .top-section h1{
                font-size:30px;
            }

            .top-section p{
                font-size:14px;
                padding:0 10px;
            }

            .login-box{
                width:100%;
                padding:25px;
            }

        }

    </style>

</head>

<body>

    <!-- TOP -->

    <div class="top-section">

        <img src="logo.png">

        <h1>CMA Vidyarthi</h1>

        <p>
            Welcome to the Interactive Learning Platform.
            Practice tests, track performance,
            and improve your CMA preparation smarter.
        </p>

    </div>


    
    <!-- LOGIN BOX -->

    <div class="login-box">

        <h2>Login</h2>

        <select id="role">
            <option value="user">Student</option>
            <option value="admin">Admin</option>
        </select>

        <form onsubmit="login(event)">

            <input type="email"
                   id="email"
                   placeholder="Enter Email"
                   required>

            <!-- PASSWORD WITH SHOW/HIDE -->

            <div class="password-box">

                <input type="password"
                       id="password"
                       placeholder="Enter Password"
                       required>

                <span onclick="togglePassword()">
                    👁️
                </span>

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <!-- GOOGLE LOGIN -->

        <button class="google-btn" onclick="googleLogin()">
            Sign in with Google
        </button>

        <div class="signup-link">
            Don't have an account?
            <a href="signup.html">Sign up</a>
        </div>

    </div>

    <!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

import {
    getAuth,
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup
}
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";


const firebaseConfig = {

    apiKey: "AIzaSyA9sSSCsEW_XWsOpz1sGJtFIuEEDLSxaj8",

    authDomain: "cma-vidyarthi-3c892.firebaseapp.com",

    projectId: "cma-vidyarthi-3c892",

    storageBucket: "cma-vidyarthi-3c892.firebasestorage.app",

    messagingSenderId: "752274115998",

    appId: "1:752274115998:web:384d4cf2d36fdec126da8f",

    measurementId: "G-8P3QWMYSXY"
};


const app = initializeApp(firebaseConfig);

const auth = getAuth(app);


/* EMAIL LOGIN */

window.login = function(event){

    event.preventDefault();

    let email =
        document.getElementById("email").value;

    let password =
        document.getElementById("password").value;

    let role =
        document.getElementById("role").value;


    // ADMIN LOGIN

    if(
        role === "admin" &&
        email === "cmavidyarthi1@gmail.com" &&
        password === "Cmainter@2002"
    ){

        localStorage.setItem("userId","admin");

        localStorage.setItem("admin","true");

        window.location.href = "admin.html";

        return;
    }


    // USER LOGIN

    signInWithEmailAndPassword(
        auth,
        email,
        password
    )

    .then((userCredential)=>{

        let user = userCredential.user;

        localStorage.setItem("userId", user.uid);

        localStorage.setItem("userEmail", user.email);

        window.location.href = "index.html";

    })

    .catch((error)=>{

        alert("Login failed: " + error.message);

    });

};


/* GOOGLE LOGIN */

window.googleLogin = function(){

    const provider = new GoogleAuthProvider();

    signInWithPopup(auth, provider)

    .then((result)=>{

        const user = result.user;

        localStorage.setItem("userId", user.uid);

        localStorage.setItem("userEmail", user.email);

        localStorage.setItem("userName", user.displayName);

        window.location.href = "index.html";

    })

    .catch((error)=>{

        console.error(error);

        alert("Google login failed: " + error.message);

    });

};


/* SHOW/HIDE PASSWORD */

window.togglePassword = function(){

    let password =
    document.getElementById("password");

    if(password.type === "password"){

        password.type = "text";

    }
    else{

        password.type = "password";

    }

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>CMA Vidyarthi Login</title>

    <style>
        body { margin: 0; font-family: Arial; }
        .container { display: flex; height: 100vh; }

        .left {
            width: 50%;
            background: linear-gradient(135deg, #0a1f44, #1f3c88);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .left img {
            width: 170px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid white;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f7fa;
        }

        .login-box {
            width: 320px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #1f3c88;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .google-btn {
            background: #db4437;
            margin-top: 10px;
        }

        .signup-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .signup-link a {
            color: #1f3c88;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="logo.png">
        <h1>CMA Vidyarthi</h1>
        <p>
            Welcome to the Interactive Learning Platform.  
            Practice tests and track your performance easily.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box">

            <h2>Login</h2>

            <select id="role">
                <option value="user">Student</option>
                <option value="admin">Admin</option>
            </select>

            <form onsubmit="login(event)">
                <input type="email" id="email" placeholder="Enter Email" required>
                <input type="password" id="password" placeholder="Enter Password" required>
                <button type="submit">Login</button>
            </form>

            <!-- ✅ GOOGLE LOGIN BUTTON (NEW CLEAN WAY) -->
            <button class="google-btn" onclick="googleLogin()">
                Sign in with Google
            </button>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>

        </div>
    </div>

</div>

<!-- FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword,
    GoogleAuthProvider,
    signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA9sSSCsEW_XWsOpz1sGJtFIuEEDLSxaj8",
  authDomain: "cma-vidyarthi-3c892.firebaseapp.com",
  projectId: "cma-vidyarthi-3c892",
  storageBucket: "cma-vidyarthi-3c892.firebasestorage.app",
  messagingSenderId: "752274115998",
  appId: "1:752274115998:web:384d4cf2d36fdec126da8f",
  measurementId: "G-8P3QWMYSXY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* EMAIL LOGIN */
window.login = function(event) {
    event.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let role = document.getElementById("role").value;

    if (role === "admin" && email === "admin@gmail.com" && password === "admin123") {
        localStorage.setItem("userId", "admin");
        window.location.href = "index.html";
        return;
    }

    signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {

            let user = userCredential.user;

            localStorage.setItem("userId", user.uid);
            localStorage.setItem("userEmail", user.email);

            window.location.href = "index.html";
        })
        .catch((error) => {
            alert("Login failed: " + error.message);
        });
};

/* ✅ GOOGLE LOGIN (CORRECT WAY) */
window.googleLogin = function() {

    const provider = new GoogleAuthProvider();

    signInWithPopup(auth, provider)
        .then((result) => {

            const user = result.user;

            localStorage.setItem("userId", user.uid);
            localStorage.setItem("userEmail", user.email);
            localStorage.setItem("userName", user.displayName);

            window.location.href = "index.html";
        })
        .catch((error) => {
            console.error(error);
            alert("Google login failed: " + error.message);
        });
};

</script>

</body>
</html>
